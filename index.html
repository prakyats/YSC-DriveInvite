  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────
       GATE SCREEN
    ───────────────────────────── */
    #gate {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 400;
      cursor: pointer;
      transition: opacity 0.6s ease;
      user-select: none;
    }

    #gate::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 3px
      );
      pointer-events: none;
    }

    #gate.hide {
      opacity: 0;
      pointer-events: none;
    }

    .gate-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
      padding: 0 40px;
    }

    .gate-logos {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .gate-logos img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      opacity: 0.75;
    }

    .gate-x {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 18px;
      color: rgba(255,255,255,0.3);
      line-height: 1;
    }

    .gate-title {
      font-family: 'Michroma', sans-serif;
      font-size: clamp(22px, 6vw, 38px);
      letter-spacing: 0.18em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .gate-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(9px, 2.5vw, 12px);
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    .gate-cta {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(9px, 2.2vw, 11px);
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      animation: blink 2.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 0.9; }
    }

    /* Gate bottom progress bar */
    .gate-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }

    .gate-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.5);
    }

    /* JS controls the animation via .running class */
    .gate-bar-fill.running {
      animation: gateFill 5s linear forwards;
    }

    @keyframes gateFill {
      to { width: 100%; }
    }

    /* ─────────────────────────────
       LOADER
    ───────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.018) 2px, rgba(255,255,255,0.018) 3px
      );
      pointer-events: none;
    }

    #loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Animations paused until .started */
    .loader-eyebrow, #main-title, .loader-rule,
    #sub-title, .progress-track, .progress-fill {
      animation-play-state: paused;
    }

    #loader.started .loader-eyebrow,
    #loader.started #main-title,
    #loader.started .loader-rule,
    #loader.started #sub-title,
    #loader.started .progress-track,
    #loader.started .progress-fill {
      animation-play-state: running;
    }

    .loader-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 0.55em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.9s ease 0.3s forwards;
      margin-bottom: 16px;
    }

    #main-title {
      font-family: 'Michroma', sans-serif;
      font-size: clamp(26px, 7vw, 56px);
      letter-spacing: 0.22em;
      color: #fff;
      line-height: 1;
      opacity: 0;
      transform: translateY(14px);
      animation: titleIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      text-transform: uppercase;
    }

    .loader-rule {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      margin: 20px auto;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.5s forwards;
    }

    #sub-title {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(8px, 2.2vw, 12px);
      letter-spacing: 0.42em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.9s ease 1.8s forwards;
      margin-bottom: 44px;
    }

    .progress-track {
      width: clamp(120px, 40vw, 220px);
      height: 1px;
      background: rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.2s forwards;
    }

    .progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(255,255,255,0.4), #fff);
      animation: progressFill 5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -2px; bottom: -2px;
      width: 20px;
      background: radial-gradient(ellipse at right, rgba(255,255,255,0.6) 0%, transparent 100%);
    }

    @keyframes titleIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn  { to { opacity: 1; } }
    @keyframes progressFill { to { width: 100%; } }

    /* ─────────────────────────────
       INVITATION VIEW
    ───────────────────────────── */
    #invitation {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #invitation.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .invite-panel {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .invite-panel.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Full-screen portrait image */
    .invite-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ─────────────────────────────
       TRAILER VIDEO
    ───────────────────────────── */
    #trailer-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #trailer-container.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #trailer-video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Preserves cinematic aspect ratio on all viewports */
      background: #000;
    }

    /* ─────────────────────────────
       TOGGLE PILL
    ───────────────────────────── */
    .toggle-container {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      padding: 3px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      gap: 2px;
      white-space: nowrap;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      background: transparent;
      border: none;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.38);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      font-size: clamp(9px, 2.2vw, 11px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s ease, background 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-btn .logo-wrap {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-btn .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.35;
      transition: opacity 0.3s ease;
      display: block;
    }

    .toggle-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .toggle-btn.active .logo-wrap img { opacity: 1; }

    .toggle-divider {
      width: 1px;
      height: 16px;
      background: rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
      margin: 0 1px;
    }
  </style>
</head>
<body>

  <!-- ── AUDIO ── -->
  <audio id="intro-audio" src="/assets/d60867a9-140c-455f-b741-7d85e665ac43.mp3" preload="auto"></audio>

  <!-- ── GATE SCREEN ── -->
  <div id="gate">
    <div class="gate-inner">
      <img src="/assets/5ed97536-2789-41fb-9f75-d35ea48519ac.png" alt="Sky City" style="width:72px;height:72px;object-fit:contain;opacity:0.9;margin-bottom:36px;">

  <script>
    const GATE_DURATION   = 5000;
    const LOADER_DURATION = 5000;
    const FADE            = 800;

    const gate       = document.getElementById('gate');
    const loader     = document.getElementById('loader');
    const invitation = document.getElementById('invitation');
    const trailer    = document.getElementById('trailer-container');
    const video      = document.getElementById('trailer-video');
    const toggleEl   = document.getElementById('toggleContainer');
    const audio      = document.getElementById('intro-audio');
    const barFill    = document.getElementById('gateBarFill');

    // ── Start gate progress bar ──
    requestAnimationFrame(() => {
      barFill.classList.add('running');
    });

    // ── Advance to loader (with or without audio) ──
    function advanceToLoader(withAudio) {
      gate.classList.add('hide');
      
      // Start preloading video immediately after interaction
      video.load();

      if (withAudio) {
        audio.play().catch(() => {});
      }
      
      setTimeout(() => {
        gate.style.display = 'none';
        loader.classList.add('started');
        
        setTimeout(() => {
          // Transition: Loader -> Video
          loader.classList.add('fade-out');
          
          setTimeout(() => {
            loader.style.display = 'none';
            trailer.classList.add('visible');
            
            // Unmute and play video
            video.muted = false;
            video.volume = 1.0;
            
            // Fade out intro audio if it's playing to avoid clashing
            const fadeOutInterval = setInterval(() => {
              if (audio.volume > 0.1) {
                audio.volume -= 0.1;
              } else {
                audio.pause();
                clearInterval(fadeOutInterval);
              }
            }, 100);

            video.play().catch(err => {
              console.warn("Autoplay with audio blocked:", err);
              // Fallback: try playing muted if unmuted fails
              video.muted = true;
              video.play().catch(e => advanceToInvitation());
            });
          }, FADE);
        }, LOADER_DURATION);
      }, 600);
    }

    // ── Video Completion Handler ──
    video.addEventListener('ended', () => {
      advanceToInvitation();
    });

    // ── Transition: Video -> Invitation ──
    function advanceToInvitation() {
      trailer.classList.remove('visible');
      
      // Resume intro audio for the final invitation view
      audio.volume = 0;
      audio.play().catch(() => {});
      const fadeInInterval = setInterval(() => {
        if (audio.volume < 0.9) {
          audio.volume += 0.1;
        } else {
          audio.volume = 1.0;
          clearInterval(fadeInInterval);
        }
      }, 100);

      setTimeout(() => {
        trailer.style.display = 'none';
        invitation.classList.add('visible');
        setTimeout(() => {
          toggleEl.style.display = '';
          toggleEl.style.opacity = '0';
          toggleEl.style.transition = 'opacity 0.6s ease';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            toggleEl.style.opacity = '1';
          }));
          startLoop();
        }, 400);
      }, 1200); // Matches transition duration
    }

    // ── Global interaction unlock (Browser Autoplay Policy) ──
    // This is the most aggressive way to "unlock" audio on mobile.
    // It listens for ANY touch or click to start the audio engine.
    const unlockAudio = () => {
      if (audio.paused && gate.style.display !== 'none') {
        audio.play().then(() => {
          console.log("Audio unlocked successfully");
          // Remove listeners once unlocked
          window.removeEventListener('click', unlockAudio);
          window.removeEventListener('touchstart', unlockAudio);
          window.removeEventListener('touchend', unlockAudio);
        }).catch((e) => {
          console.warn("Audio unlock failed, waiting for stronger interaction:", e);
        });
        video.load(); 
      }
    };

    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('touchstart', unlockAudio, { once: true });
    window.addEventListener('touchend', unlockAudio, { once: true });

    // ── Click/tap to advance early ──
    gate.addEventListener('click', () => {
      clearTimeout(autoTimer);
      unlockAudio(); // Ensure audio is unlocked on this specific click
      advanceToLoader(true);
    }, { once: true });

    // ── Auto-advance after 5 s ──
    const autoTimer = setTimeout(() => {
      advanceToLoader(true); 
    }, GATE_DURATION);

    // ── Auto-loop ──
    const panels = ['skycity', 'temerario'];
    let currentIndex = 0;
    let loopInterval = null;

    function switchTo(id) {
      currentIndex = panels.indexOf(id);
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.target === id);
      });
      document.querySelectorAll('.invite-panel').forEach(p => {
        p.classList.toggle('active', p.id === id);
      });
    }

    function startLoop() {
      clearInterval(loopInterval);
      loopInterval = setInterval(() => {
        currentIndex = (currentIndex + 1) % panels.length;
        switchTo(panels[currentIndex]);
      }, 10000);
    }

    // ── Toggle logic ──
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        if (btn.classList.contains('active')) return;
        switchTo(target);
        startLoop(); // reset timer on manual switch
      });
    });
  </script>



</body></html>

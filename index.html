  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────
       GATE SCREEN
    ───────────────────────────── */
    #gate {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #gate.hide {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }
    .gate-inner {
      text-align: center;
      pointer-events: none;
    }
    .gate-logo {
      width: clamp(70px, 15vw, 90px);
      height: auto;
      object-fit: contain;
      opacity: 0.9;
      margin-bottom: 44px;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.05));
      animation: logo-breath 4s ease-in-out infinite;
    }
    .gate-cta {
      font-family: 'IBM Plex Mono', monospace;
      color: rgba(255,255,255,0.5);
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      font-weight: 300;
      animation: cta-pulse 3s ease-in-out infinite;
      transition: color 0.4s ease;
    }
    @keyframes logo-breath {
      0%, 100% { opacity: 0.7; transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,255,255,0.05)); }
      50% { opacity: 1; transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(255,255,255,0.15)); }
    }
    @keyframes cta-pulse {
      0%, 100% { opacity: 0.35; letter-spacing: 0.6em; }
      50% { opacity: 0.85; letter-spacing: 0.65em; }
    }
    .gate-bar {
      position: absolute;
      bottom: 60px;
      width: 140px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      opacity: 0.5;
    }
    .gate-bar-fill {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.4);
      transform: translateX(-100%);
    }
    .gate-bar-fill.running {
      transform: translateX(0);
      transition: transform 3s ease-out;
    }

    /* ─────────────────────────────
       LOADER
    ───────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.018) 2px, rgba(255,255,255,0.018) 3px
      );
      pointer-events: none;
    }

    #loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Animations paused until .started */
    .loader-eyebrow, #main-title, .loader-rule,
    #sub-title, .progress-track, .progress-fill {
      animation-play-state: paused;
    }

    #loader.started .loader-eyebrow,
    #loader.started #main-title,
    #loader.started .loader-rule,
    #loader.started #sub-title,
    #loader.started .progress-track,
    #loader.started .progress-fill {
      animation-play-state: running;
    }

    .loader-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 0.55em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.9s ease 0.2s forwards;
      margin-bottom: 16px;
    }

    #main-title {
      font-family: 'Michroma', sans-serif;
      font-size: clamp(26px, 7vw, 56px);
      letter-spacing: 0.22em;
      color: #fff;
      line-height: 1;
      opacity: 0;
      transform: translateY(14px);
      animation: titleIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      text-transform: uppercase;
    }

    .loader-rule {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      margin: 20px auto;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.8s forwards;
    }

    #sub-title {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: clamp(8px, 2.2vw, 12px);
      letter-spacing: 0.42em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.9s ease 1.0s forwards;
      margin-bottom: 44px;
    }

    .progress-track {
      width: clamp(120px, 40vw, 220px);
      height: 1px;
      background: rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.2s forwards;
    }

    .progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(255,255,255,0.4), #fff);
      animation: progressFill 3s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -2px; bottom: -2px;
      width: 20px;
      background: radial-gradient(ellipse at right, rgba(255,255,255,0.6) 0%, transparent 100%);
    }

    @keyframes titleIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn  { to { opacity: 1; } }
    @keyframes progressFill { to { width: 100%; } }

    /* ─────────────────────────────
       INVITATION VIEW
    ───────────────────────────── */
    #invitation {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #invitation.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .invite-panel {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      position: relative;
    }

    /* ── PANELS CONTAINER ── */
    #invitation {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    #invitation.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .panels-wrapper {
      display: flex;
      width: 200vw;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
    }

    /* Full-screen portrait image */
    .invite-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ─────────────────────────────
       TRAILER VIDEO
    ───────────────────────────── */
    #trailer-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #trailer-container.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #trailer-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* ─────────────────────────────
       TOGGLE PILL
    ───────────────────────────── */
    .toggle-container {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      padding: 3px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      gap: 2px;
      white-space: nowrap;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      animation: toggle-intro 1.2s ease forwards, toggle-float 6s ease-in-out infinite;
    }

    @keyframes toggle-intro {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes toggle-float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(2px); }
    }

    @keyframes toggle-nudge {
      0%, 80%, 100% { transform: translateX(-50%); }
      85% { transform: translateX(-53%); }
      90% { transform: translateX(-47%); }
      95% { transform: translateX(-50%); }
    }

    /* Added periodic nudge to indicate interactivity */
    .toggle-container.discover {
      animation: toggle-float 6s ease-in-out infinite, toggle-nudge 10s ease-in-out infinite 5s;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: transparent;
      border: none;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.5); /* Improved inactive visibility */
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      font-size: clamp(9px, 2.2vw, 11px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .toggle-btn .logo-wrap {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-btn .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.45; /* Improved inactive visibility */
      transition: opacity 0.4s ease;
      display: block;
    }

    .toggle-btn.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .toggle-btn.active .logo-wrap img { opacity: 1; }

    .toggle-divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ── SWIPE HINT ── */
    #swipe-hint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }

    #swipe-hint.visible { opacity: 1; }

    .hint-dot {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.4;
      animation: hint-pulse 2s infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.5); opacity: 0.8; }
    }
  </style>
</head>
<body>

  <audio id="intro-audio" src="assets/d60867a9-140c-455f-b741-7d85e665ac43.mp3" playsinline preload="auto"></audio>

  <script>
    const LOADER_DURATION = 3000;
    const FADE            = 800;

    const gate       = document.getElementById('gate');
    const loader     = document.getElementById('loader');
    const invitation = document.getElementById('invitation');
    const trailer    = document.getElementById('trailer-container');
    const video      = document.getElementById('trailer-video');
    const toggleEl   = document.getElementById('toggleContainer');
    const audio      = document.getElementById('intro-audio');
    const barFill    = document.getElementById('gateBarFill');
    const panelsWrapper = document.getElementById('panelsWrapper');
    const swipeHint  = document.getElementById('swipe-hint');

    // ── Pre-Interaction State ──
    requestAnimationFrame(() => {
      barFill.classList.add('running');
    });

    // ── Cinematic Engine ──
    let audioCtx = null;
    let source = null;

    const startExperience = () => {
      if (gate.classList.contains('hide')) return;
      
      // Initialize Audio Context (Standard Bypass)
      if (!audioCtx) {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AudioContext();
          source = audioCtx.createMediaElementSource(audio);
          source.connect(audioCtx.destination);
        } catch (e) {}
      }
      
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      // Unlock & Play Audio
      audio.currentTime = 0;
      audio.muted = false;
      audio.volume = 1.0;
      
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {});
      }

      // Nudge video (muted) to ensure it's unlocked
      video.muted = true;
      video.play().then(() => video.pause()).catch(() => {});

      // Begin Cinematic Progression
      advanceToLoader();
    };

    // Full-screen interaction triggers
    gate.addEventListener('click', startExperience, { once: true });
    gate.addEventListener('touchstart', startExperience, { once: true, passive: true });

    function advanceToLoader() {
      if (gate.classList.contains('hide')) return; 
      gate.classList.add('hide');
      video.load();

      setTimeout(() => {
        gate.style.display = 'none';
        loader.classList.add('started');
        
        setTimeout(() => {
          loader.classList.add('fade-out');
          
          setTimeout(() => {
            loader.style.display = 'none';
            trailer.classList.add('visible');
            
            video.muted = false;
            video.volume = 1.0;
            
            const fadeOutInterval = setInterval(() => {
              if (audio.volume > 0.1) audio.volume -= 0.1;
              else { audio.pause(); clearInterval(fadeOutInterval); }
            }, 100);

            video.play().catch(err => {
              console.warn("Video block:", err);
              video.muted = true;
              video.play().catch(e => advanceToInvitation());
            });
          }, FADE);
        }, LOADER_DURATION);
      }, 1200); // Total timing matches 5s audio
    }

    video.addEventListener('ended', () => advanceToInvitation());

    function advanceToInvitation() {
      trailer.classList.remove('visible');
      
      audio.currentTime = 0;
      audio.volume = 0;
      audio.muted = false;
      audio.play().catch(() => {});
      
      const fadeInInterval = setInterval(() => {
        if (audio.volume < 0.9) audio.volume += 0.1;
        else { audio.volume = 1.0; clearInterval(fadeInInterval); }
      }, 100);

      setTimeout(() => {
        trailer.style.display = 'none';
        invitation.classList.add('visible');
        
        setTimeout(() => {
          toggleEl.style.display = '';
          toggleEl.style.opacity = '0';
          toggleEl.style.transition = 'opacity 0.6s ease';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            toggleEl.style.opacity = '1';
            // Start subtle discoverability motion after 2s
            setTimeout(() => toggleEl.classList.add('discover'), 2000);
          }));

          // Show swipe hint briefly on first load
          swipeHint.classList.add('visible');
          setTimeout(() => swipeHint.classList.remove('visible'), 4500);

          startLoop();
        }, 400);
      }, 1200);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !gate.classList.contains('hide') && !audio.paused) {
        audio.play().catch(() => {});
      }
    });

    // ── Navigation & Swipe Engine ──
    const panels = ['skycity', 'temerario'];
    let currentIndex = 0;
    let loopInterval = null;

    function switchTo(id) {
      currentIndex = panels.indexOf(id);
      
      // Update Toggle State
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.target === id);
      });

      // Slide Wrapper
      panelsWrapper.style.transform = `translateX(-${currentIndex * 100}vw)`;
    }

    function startLoop() {
      if (loopInterval) clearInterval(loopInterval);
      loopInterval = setInterval(() => {
        currentIndex = (currentIndex + 1) % panels.length;
        switchTo(panels[currentIndex]);
      }, 10000);
    }

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        clearInterval(loopInterval);
        switchTo(btn.dataset.target);
        setTimeout(startLoop, 10000);
      });
    });
  </script>
